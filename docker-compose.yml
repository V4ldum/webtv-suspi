services:
    webtv:
        image: ghcr.io/v4ldum/webtv:latest
        restart: unless-stopped
        # Draining
        healthcheck:
            test: /bin/test ! -f /tmp/drain # && some other healthcheck
            interval: 5s
            retries: 1
        networks:
            - "netv6"
        environment:
            - TZ=Europe/Paris
        volumes:
            - type: bind
              source: /root/webtv/webtv.env
              target: /app/.env
              read_only: true
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.webtv.tls=true"
            - "traefik.http.routers.webtv.entrypoints=websecure"
            - "traefik.http.routers.webtv.rule=Host(`webtv.valdum.dev`)"

networks:
    netv6:
        external: true
